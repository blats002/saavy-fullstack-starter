services:
  mysql:
    image: 'mysql:8.0'
    container_name: mysql-container
    environment:
      - 'MYSQL_DATABASE=saavy_db'
      - 'MYSQL_PASSWORD=Tinals00a'
      - 'MYSQL_ROOT_PASSWORD=verysecret'
      - 'MYSQL_USER=mabelLocal'
    ports:
      - '33306:3306'
    volumes:
      - 'mysql_data:/var/lib/mysql'
  keycloak:
      image: quay.io/keycloak/keycloak:22.0.5
      container_name: keycloak-container
      environment:
        KC_DB: keycloak
        KC_DB_URL_HOST: mysql
        KC_DB_USERNAME: mabelLocal
        KC_DB_PASSWORD: Tinals00a
        KEYCLOAK_ADMIN: admin
        KEYCLOAK_ADMIN_PASSWORD: adminpassword
      ports:
        - "8081:8080"
      depends_on:
        - mysql
      command: start-dev
  springboot:
    build:
        context: .
    container_name: springboot-container
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/saavy_db
      SPRING_DATASOURCE_USERNAME: mabelLocal
      SPRING_DATASOURCE_PASSWORD: Tinals00a
    ports:
      - '8080:8080'
    depends_on:
      - mysql
volumes:
  mysql_data:

