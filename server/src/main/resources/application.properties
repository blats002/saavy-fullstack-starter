# Render PostgreSQL database connection properties
# Get DATABASE_URL from Render dashboard and configure below
# Format: postgresql://username:password@host:port/database
# Example: postgresql://user@host:5432/dbname?sslmode=require
#
# You can either:
# 1. Parse the DATABASE_URL and set individual properties (recommended)
# 2. Use connection URL directly with environment variable substitution
#
# Option 1: Individual properties (set environment variables in Render dashboard)
# spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=require
# spring.datasource.username=${DB_USER}
# spring.datasource.password=${DB_PASSWORD}
#
# Option 2: Parse DATABASE_URL from Render
# Note: This requires a filter or startup listener to parse the DATABASE_URL variable
# For simplicity, Option 1 is recommended
